<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фитнес Аналитика Астана</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 350px; 
        }
        h1 { 
            color: #2d3436; 
            font-size: 26px; 
            margin-bottom: 10px; 
            font-weight: 700;
        }
        p {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0984e3; 
            color: white; 
            text-decoration: none; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 12px; 
            font-weight: 600; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 6px rgba(9, 132, 227, 0.2);
        }
        .btn:hover { 
            background: #74b9ff; 
            transform: translateY(-3px); 
            box-shadow: 0 7px 14px rgba(9, 132, 227, 0.3);
        }
        .btn i { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🇰🇿 Fitness Astana</h1>
        <p>Интерактивные отчеты по рынку женского фитнеса</p>
        
        <a href="timeline.html" class="btn">📅 Таймлайн открытий</a>
        <a href="ratings.html" class="btn">⭐ Анализ рейтингов</a>
        <a href="brand.html" class="btn">🏢 Экспансия брендов</a>
        
    </div>
</body>
</html>
